AWSTemplateFormatVersion: '2010-09-09'
Description: List Users API - Get all users from DynamoDB

Parameters:
  RestApiId:
    Type: String
    Description: Existing API Gateway REST API ID
    Default: 8ur8l436ff

  TableName:
    Type: String
    Description: DynamoDB table name
    Default: fashionstore-prod

  Environment:
    Type: String
    Default: prod

Resources:
  ListUsersFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub fashionstore-${Environment}-list-users
      Runtime: nodejs18.x
      Handler: index.handler
      Role: !GetAtt ListUsersRole.Arn
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref TableName
      Code:
        ZipFile: |
          const AWS = require('aws-sdk');
          const dynamodb = new AWS.DynamoDB.DocumentClient();

          const TABLE_NAME = process.env.TABLE_NAME;

          exports.handler = async (event) => {
            const headers = {
              'Access-Control-Allow-Origin': '*',
              'Access-Control-Allow-Headers': 'Content-Type',
              'Access-Control-Allow-Methods': 'GET,OPTIONS'
            };

            if (event.httpMethod === 'OPTIONS') {
              return { statusCode: 200, headers, body: '' };
            }

            try {
              const method = event.httpMethod;

              // GET /users - List all users
              if (method === 'GET') {
                const params = {
                  TableName: TABLE_NAME,
                  KeyConditionExpression: 'begins_with(PK, :pkPrefix)',
                  ExpressionAttributeValues: {
                    ':pkPrefix': 'USER#'
                  },
                  ScanIndexForward: true
                };

                const result = await dynamodb.query(params).promise();

                // Extract user profiles from the items
                const users = result.Items
                  .filter(item => item.SK === 'PROFILE' && item.profile)
                  .map(item => ({
                    userId: item.PK.replace('USER#', ''),
                    email: item.profile?.email || '',
                    firstName: item.profile?.firstName || '',
                    lastName: item.profile?.lastName || '',
                    contact: item.profile?.contact || '',
                    createdAt: item.createdAt || item.updatedAt || new Date().toISOString()
                  }));

                return {
                  statusCode: 200,
                  headers,
                  body: JSON.stringify({ users, total: users.length })
                };
              }

              return {
                statusCode: 405,
                headers,
                body: JSON.stringify({ error: 'Method not allowed' })
              };
            } catch (error) {
              console.error('Error:', error);
              return {
                statusCode: 500,
                headers,
                body: JSON.stringify({ error: error.message })
              };
            }
          };

  ListUsersRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:Query
                Resource: !Sub arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}

  UsersResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApiId
      ParentId: !GetAtt RestApiRootId.RootResourceId
      PathPart: users

  UsersGetMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApiId
      ResourceId: !Ref UsersResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ListUsersFunction.Arn}/invocations

  UsersOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApiId
      ResourceId: !Ref UsersResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
        RequestTemplates:
          application/json: '{"statusCode": 200}'
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-AllowOrigin: true

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ListUsersFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApiId}/*/*

  RestApiRootId:
    Type: Custom::GetRootResourceId
    Properties:
      ServiceToken: !GetAtt GetRootResourceFunction.Arn
      RestApiId: !Ref RestApiId

  GetRootResourceFunction:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.9
      Handler: index.handler
      Role: !GetAtt GetRootResourceRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse

          def handler(event, context):
            if event['RequestType'] == 'Delete':
              cfnresponse.send(event, context, cfnresponse.SUCCESS, {})
              return

            try:
              api_client = boto3.client('apigateway')
              response = api_client.get_resources(
                restApiId=event['ResourceProperties']['RestApiId'],
                limit=500
              )
              root = [r for r in response['items'] if r['path'] == '/'][0]
              cfnresponse.send(event, context, cfnresponse.SUCCESS, {
                'RootResourceId': root['id']
              })
            except Exception as e:
              cfnresponse.send(event, context, cfnresponse.FAILED, {'Error': str(e)})

  GetRootResourceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ApiGatewayAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: apigateway:GET
                Resource: '*'

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - UsersGetMethod
      - UsersOptionsMethod
    Properties:
      RestApiId: !Ref RestApiId
      StageName: !Ref Environment

Outputs:
  ListUsersFunctionArn:
    Value: !GetAtt ListUsersFunction.Arn

  UsersEndpoint:
    Value: !Sub https://${RestApiId}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/users
