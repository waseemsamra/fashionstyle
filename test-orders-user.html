<!DOCTYPE html>
<html>
<head>
    <title>Test Orders for User</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>🧪 Test Orders API</h1>
    <div id="results"></div>

    <script>
        const API_URL = 'https://xpyh8srop0.execute-api.us-east-1.amazonaws.com/prod';
        
        // Test different userId formats
        const testEmails = [
            'waseem.samra@hotmail.com',
            'waseem.samra@gmail.com',
            'waseem.samra@tcmiglobal.com'
        ];

        async function testOrders() {
            const resultsDiv = document.getElementById('results');
            
            for (const email of testEmails) {
                const userIdShort = email.split('@')[0].replace(/[^a-zA-Z0-9]/g, '-');
                const userIdFull = email.replace(/[^a-zA-Z0-9]/g, '-');
                
                resultsDiv.innerHTML += `<h3 class="info">Testing: ${email}</h3>`;
                resultsDiv.innerHTML += `<p>Short userId: <strong>${userIdShort}</strong></p>`;
                resultsDiv.innerHTML += `<p>Full userId: <strong>${userIdFull}</strong></p>`;
                
                // Test with short userId
                try {
                    const response = await fetch(`${API_URL}/users/${userIdShort}/orders`);
                    const data = await response.json();
                    
                    if (data.orders && data.orders.length > 0) {
                        resultsDiv.innerHTML += `<p class="success">✅ Found ${data.orders.length} orders with short userId!</p>`;
                        resultsDiv.innerHTML += `<pre>${JSON.stringify(data.orders, null, 2)}</pre>`;
                    } else {
                        resultsDiv.innerHTML += `<p class="error">❌ No orders found with short userId</p>`;
                    }
                } catch (error) {
                    resultsDiv.innerHTML += `<p class="error">❌ Error: ${error.message}</p>`;
                }
                
                resultsDiv.innerHTML += `<hr>`;
            }
        }

        testOrders();
    </script>
</body>
</html>
