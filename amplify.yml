version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - rm -rf node_modules/.vite dist .amplify 2>/dev/null || true
            - npm ci --cache .npm --prefer-offline
            - npm install react react-dom
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: dist
        files:
          - '**/*'
      cache:
        paths:
          - .npm/**/*
          - node_modules/**/*
    rewrites:
      - source: '/<*>.html'
        target: '/index.html'
      - source: '/**'
        target: '/index.html'
      - source: '/assets/<*>.css'
        target: '/assets/*.css'
      - source: '/assets/<*>.js'
        target: '/assets/*.js'
